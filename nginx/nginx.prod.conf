# =============================================================================
# Adaptive API Gateway — Nginx config (PRODUCTION, TLS)
# Mounted at /etc/nginx/nginx.conf
#
# Terminates TLS and reverse-proxies to the FastAPI gateway ("gateway:8000").
#
# BEFORE USE: replace every occurrence of DOMAIN below with your real domain
# (e.g. gateway.example.com). Certificates are issued by Certbot using the
# webroot method:
#
#   certbot certonly --webroot -w /var/www/certbot -d DOMAIN
#
# The HTTP server keeps /.well-known/acme-challenge/ open and served from the
# webroot (/var/www/certbot) so Certbot can complete the HTTP-01 challenge and
# renew without downtime. Everything else on :80 is 301-redirected to HTTPS.
# Mount the webroot and /etc/letsencrypt into this container via compose.
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Performance --------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # ---- Request body size --------------------------------------------------
    client_max_body_size 10m;

    # ---- Compression --------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/plain
        text/css
        text/javascript
        text/xml;

    # ---- Rate limiting zones ------------------------------------------------
    # General API traffic: 20 requests/second per client IP.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    # Stricter zone for login (brute-force protection): 5 requests/minute.
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_status 429;

    # ---- Logging ------------------------------------------------------------
    log_format gateway '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log gateway;
    error_log  /var/log/nginx/error.log warn;

    # ---- Upstream -----------------------------------------------------------
    upstream gateway {
        server gateway:8000;
        keepalive 32;
    }

    # ---- Proxy timeouts (shared) --------------------------------------------
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ---- Shared proxy headers -----------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Pass through client network-hint headers (see dev config for rationale).
    proxy_set_header Accept-Encoding $http_accept_encoding;
    proxy_set_header ECT             $http_ect;
    proxy_set_header Save-Data       $http_save_data;
    proxy_set_header X-Client-RTT    $http_x_client_rtt;

    # =========================================================================
    # HTTP :80 — ACME challenge + redirect everything else to HTTPS
    # =========================================================================
    server {
        listen 80;
        server_name DOMAIN;

        # Certbot HTTP-01 challenge files, served from the shared webroot.
        # Must stay reachable over plain HTTP for issuance and renewal.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # All other HTTP traffic is permanently redirected to HTTPS.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS :443 — TLS termination + reverse proxy to the gateway
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name DOMAIN;

        # ---- TLS certificates (issued by Certbot) ---------------------------
        # Replace DOMAIN with your real domain. These paths are created by
        # `certbot certonly --webroot` and renewed automatically.
        ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

        # ---- Modern TLS settings -------------------------------------------
        ssl_protocols              TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers  on;
        ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache          shared:SSL:10m;
        ssl_session_timeout        1d;
        ssl_session_tickets        off;

        # ---- HSTS -----------------------------------------------------------
        # Force HTTPS for 6 months including subdomains. Only enable once you
        # are confident HTTPS works for the whole domain.
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # ---- Health check (open, no auth, no rate limit) --------------------
        location = /health {
            proxy_pass http://gateway;
        }

        # ---- Prometheus metrics --------------------------------------------
        # Restrict scraping to internal networks / Prometheus host only.
        location = /metrics {
            # allow 172.16.0.0/12;   # docker bridge networks
            # allow 127.0.0.1;
            # deny  all;
            proxy_pass http://gateway;
        }

        # ---- Auth login (strict rate limit) ---------------------------------
        location = /auth/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://gateway;
        }

        # ---- Everything else (general API rate limit) -----------------------
        # NOTE: proxy_pass has NO trailing slash and NO URI so the full request
        # path (/auth, /proxy/{service}/..., /admin/...) reaches the gateway
        # unchanged. A trailing slash would strip the location prefix.
        location / {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://gateway;
        }
    }
}
