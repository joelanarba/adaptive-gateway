# =============================================================================
# Adaptive API Gateway — Nginx config (LOCAL / DEV, HTTP only)
# Mounted at /etc/nginx/nginx.conf
#
# Reverse proxy in front of the FastAPI gateway (service "gateway:8000" on the
# gateway-net docker network). Plain HTTP only — TLS lives in nginx.prod.conf.
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Performance --------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # ---- Request body size --------------------------------------------------
    client_max_body_size 10m;

    # ---- Compression --------------------------------------------------------
    # The gateway's Response Optimizer also gzips on DEGRADED links; this is a
    # safety net for any responses that pass through unmodified.
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/plain
        text/css
        text/javascript
        text/xml;

    # ---- Rate limiting zones ------------------------------------------------
    # General API traffic: 20 requests/second per client IP.
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    # Stricter zone for login (brute-force protection): 5 requests/minute.
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_status 429;

    # ---- Logging ------------------------------------------------------------
    log_format gateway '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log gateway;
    error_log  /var/log/nginx/error.log warn;

    # ---- Upstream -----------------------------------------------------------
    upstream gateway {
        server gateway:8000;
        keepalive 32;
    }

    # ---- Proxy timeouts (shared) --------------------------------------------
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ---- Shared proxy headers -----------------------------------------------
    # Forwarded to the gateway on every proxied location.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # Pass through client network-hint headers so the Network Detector can
    # classify quality. Do NOT strip these.
    #   - Accept-Encoding lets the optimizer know if the client accepts gzip.
    #   - ECT / Save-Data are Client Hints (effective connection type).
    #   - X-Client-RTT is our custom client-measured round-trip-time hint.
    proxy_set_header Accept-Encoding $http_accept_encoding;
    proxy_set_header ECT             $http_ect;
    proxy_set_header Save-Data       $http_save_data;
    proxy_set_header X-Client-RTT    $http_x_client_rtt;

    server {
        listen 80;
        server_name _;

        # ---- Health check (open, no auth, no rate limit) --------------------
        location = /health {
            proxy_pass http://gateway;
        }

        # ---- Prometheus metrics --------------------------------------------
        # Restrict scraping to internal networks. Uncomment / adjust the CIDR
        # for your docker network or Prometheus host. In dev this is left open.
        location = /metrics {
            # allow 172.16.0.0/12;   # docker bridge networks
            # allow 127.0.0.1;
            # deny  all;
            proxy_pass http://gateway;
        }

        # ---- Auth login (strict rate limit) ---------------------------------
        # Tighter zone to slow credential-stuffing. burst absorbs short bursts,
        # nodelay serves them immediately rather than queueing.
        location = /auth/login {
            limit_req zone=login burst=5 nodelay;

            # Never cache auth; pass the full path through unchanged.
            proxy_pass http://gateway;
        }

        # ---- Everything else (general API rate limit) -----------------------
        # NOTE: proxy_pass has NO trailing slash and NO URI — nginx forwards the
        # full original request path (/auth, /proxy/{service}/..., /admin/...)
        # to the gateway unchanged. Adding a trailing slash here would strip the
        # location prefix and break routing.
        location / {
            limit_req zone=api burst=40 nodelay;

            proxy_pass http://gateway;
        }
    }
}
