AWSTemplateFormatVersion: '2010-09-09'
Description: 'Adaptive Gateway - EC2 Deployment with Docker Compose'

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type (t3.micro is free-tier eligible in many regions).

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Optional. Name of an existing EC2 KeyPair to enable SSH access to the instance.
    Default: ''

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Resources:
  AdaptiveGatewaySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and dashboard traffic for Adaptive Gateway
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Nginx / Main proxy endpoint
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
          Description: API Gateway direct access
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0
          Description: Next.js Admin Dashboard and Grafana
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH Access

  AdaptiveGatewayInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      SecurityGroups:
        - !Ref AdaptiveGatewaySecurityGroup
      # Amazon Linux 2023 AMI (x86_64) - dynamically fetched
      ImageId: !Resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          # Update OS and install Git and Docker
          dnf update -y
          dnf install -y git docker
          
          # Start Docker daemon
          systemctl enable docker
          systemctl start docker
          usermod -aG docker ec2-user
          
          # Install Docker Compose plugin
          mkdir -p /usr/local/lib/docker/cli-plugins/
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          # Alias docker-compose
          ln -s /usr/local/lib/docker/cli-plugins/docker-compose /usr/bin/docker-compose

          # Clone Repository
          cd /home/ec2-user
          git clone https://github.com/joelanarba/adaptive-gateway.git
          cd adaptive-gateway
          
          # Setup dummy env files
          cp .env.example .env
          cp gateway.yaml.example gateway.yaml
          
          # Fix ownership so ec2-user can access it
          chown -R ec2-user:ec2-user /home/ec2-user/adaptive-gateway

          # Start stack!
          docker-compose up -d --build

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref AdaptiveGatewayInstance
  DashboardURL:
    Description: URL for the Next.js Admin Dashboard
    Value: !Sub "http://${AdaptiveGatewayInstance.PublicDnsName}:3000"
  APIEndpoint:
    Description: Base URL for the Gateway API
    Value: !Sub "http://${AdaptiveGatewayInstance.PublicDnsName}:8000"
