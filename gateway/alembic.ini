# Alembic configuration for the Adaptive API Gateway.
#
# Run from the gateway/ directory (this file's location). The database URL is
# NOT set here on purpose — migrations/env.py loads it from the application
# settings (settings.database_url) at runtime via config.set_main_option().

[alembic]
# Path to migration scripts, relative to this file.
script_location = migrations

# Prepend the current directory (gateway/) to sys.path so env.py can do
# top-level imports like "from config import settings" and "from models.db
# import Base", matching the app's import root.
prepend_sys_path = .

# Template used to generate migration files.
# file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file as well as
# the filename. Leave blank for local time.
# timezone =

# Max length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Version path separator; defaults to os.pathsep.
# version_path_separator = os

# Database URL — intentionally left blank. env.py sets it from app settings.
sqlalchemy.url =


[post_write_hooks]
# Optional hooks to run on newly generated revision scripts. Disabled by
# default; uncomment to format generated migrations with black + ruff.
# hooks = black, ruff
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME


# Logging configuration. These sections are required by Alembic's default
# logging setup; keep them in place.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
